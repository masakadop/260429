<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1ファイル Tetris</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      color: white;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    canvas {
      background: #020617;
      border: 3px solid #334155;
      box-shadow: 0 0 30px rgba(0,0,0,.5);
    }

    .panel {
      width: 180px;
      background: #1f2937;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .score {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .help {
      font-size: 14px;
      line-height: 1.8;
      color: #cbd5e1;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      background: #38bdf8;
      color: #082f49;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="300" height="600"></canvas>

    <div class="panel">
      <h1>Tetris</h1>
      <div class="score">
        Score<br>
        <strong id="score">0</strong>
      </div>

      <div class="help">
        ← →：移動<br>
        ↓：落下<br>
        ↑：回転<br>
        Space：一気に落下<br>
        P：一時停止
      </div>

      <button onclick="restart()">Restart</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const COLORS = [
      null,
      "#22d3ee",
      "#3b82f6",
      "#f97316",
      "#eab308",
      "#22c55e",
      "#a855f7",
      "#ef4444"
    ];

    const SHAPES = [
      [],
      [[1, 1, 1, 1]],
      [[2, 0, 0], [2, 2, 2]],
      [[0, 0, 3], [3, 3, 3]],
      [[4, 4], [4, 4]],
      [[0, 5, 5], [5, 5, 0]],
      [[0, 6, 0], [6, 6, 6]],
      [[7, 7, 0], [0, 7, 7]]
    ];

    let board;
    let piece;
    let score;
    let dropCounter;
    let dropInterval;
    let lastTime;
    let paused;
    let gameOver;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function createPiece() {
      const type = Math.floor(Math.random() * 7) + 1;
      const matrix = SHAPES[type].map(row => [...row]);

      return {
        matrix,
        x: Math.floor(COLS / 2) - Math.ceil(matrix[0].length / 2),
        y: 0
      };
    }

    function drawBlock(x, y, value) {
      ctx.fillStyle = COLORS[value];
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);

      ctx.strokeStyle = "#020617";
      ctx.lineWidth = 2;
      ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            drawBlock(x + offset.x, y + offset.y, value);
          }
        });
      });
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      board.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) drawBlock(x, y, value);
        });
      });

      drawMatrix(piece.matrix, piece);

      if (paused) {
        overlay("PAUSED");
      }

      if (gameOver) {
        overlay("GAME OVER");
      }
    }

    function overlay(text) {
      ctx.fillStyle = "rgba(0,0,0,.65)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.font = "bold 34px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function collide(board, piece) {
      const m = piece.matrix;
      const o = piece;

      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
          if (
            m[y][x] !== 0 &&
            (
              board[y + o.y] === undefined ||
              board[y + o.y][x + o.x] === undefined ||
              board[y + o.y][x + o.x] !== 0
            )
          ) {
            return true;
          }
        }
      }

      return false;
    }

    function merge(board, piece) {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[y + piece.y][x + piece.x] = value;
          }
        });
      });
    }

    function rotate(matrix) {
      const result = matrix[0].map((_, i) =>
        matrix.map(row => row[i]).reverse()
      );
      return result;
    }

    function rotatePiece() {
      const oldMatrix = piece.matrix;
      const oldX = piece.x;

      piece.matrix = rotate(piece.matrix);

      let offset = 1;
      while (collide(board, piece)) {
        piece.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));

        if (Math.abs(offset) > piece.matrix[0].length + 1) {
          piece.matrix = oldMatrix;
          piece.x = oldX;
          return;
        }
      }
    }

    function clearLines() {
      let lines = 0;

      outer:
      for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] === 0) {
            continue outer;
          }
        }

        board.splice(y, 1);
        board.unshift(Array(COLS).fill(0));
        lines++;
        y++;
      }

      if (lines > 0) {
        score += [0, 100, 300, 500, 800][lines];
        scoreEl.textContent = score;
        dropInterval = Math.max(120, 700 - Math.floor(score / 500) * 45);
      }
    }

    function drop() {
      piece.y++;

      if (collide(board, piece)) {
        piece.y--;
        merge(board, piece);
        clearLines();
        piece = createPiece();

        if (collide(board, piece)) {
          gameOver = true;
        }
      }

      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide(board, piece)) {
        piece.y++;
      }

      piece.y--;
      merge(board, piece);
      clearLines();
      piece = createPiece();

      if (collide(board, piece)) {
        gameOver = true;
      }

      dropCounter = 0;
    }

    function move(dir) {
      piece.x += dir;
      if (collide(board, piece)) {
        piece.x -= dir;
      }
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;

      if (!paused && !gameOver) {
        dropCounter += delta;

        if (dropCounter > dropInterval) {
          drop();
        }
      }

      draw();
      requestAnimationFrame(update);
    }

    function restart() {
      board = createBoard();
      piece = createPiece();
      score = 0;
      dropCounter = 0;
      dropInterval = 700;
      lastTime = 0;
      paused = false;
      gameOver = false;
      scoreEl.textContent = score;
    }

    document.addEventListener("keydown", event => {
      if (gameOver && event.key !== "Enter") return;

      if (event.key === "ArrowLeft") {
        move(-1);
      } else if (event.key === "ArrowRight") {
        move(1);
      } else if (event.key === "ArrowDown") {
        drop();
      } else if (event.key === "ArrowUp") {
        rotatePiece();
      } else if (event.code === "Space") {
        event.preventDefault();
        hardDrop();
      } else if (event.key.toLowerCase() === "p") {
        paused = !paused;
      } else if (event.key === "Enter" && gameOver) {
        restart();
      }
    });

    restart();
    update();
  </script>
</body>
</html>
